[app]
# Application settings
listen_host = "0.0.0.0"
listen_port = 8080
log_level = "DEBUG"
project_name = "VideoPrinterTurbo"
project_version = "0.1.0"

# --- LLM Provider ---
# Supported: openai, deepseek, gemini
llm_provider = "openai"

# OpenAI / OpenAI-compatible
openai_api_key = ""
openai_base_url = ""
openai_model_name = "gpt-4o-mini"

# DeepSeek
deepseek_api_key = ""
deepseek_base_url = "https://api.deepseek.com"
deepseek_model_name = "deepseek-chat"

# Google Gemini
gemini_api_key = ""
gemini_model_name = "gemini-2.5-flash"

# --- Video Downloader ---
# Supported: yt-dlp
downloader_provider = "yt-dlp"
# Leave empty for default: ./downloads/
downloads_dir = ""

# --- Transcriber ---
# Supported: whisper, subtitle_extractor
transcriber_provider = "whisper"

# --- Subtitle ---
# Supported: edge, whisper
subtitle_provider = "edge"

# --- Material Source ---
# Supported: pexels, pixabay
material_provider = "pexels"

# Pexels API Key(s)
# Register at https://www.pexels.com/api/
pexels_api_keys = []

# Pixabay API Key(s)
# Register at https://pixabay.com/api/docs/
pixabay_api_keys = []

# TLS verify for external API calls
tls_verify = true

# Edge TTS timeout (seconds)
edge_tts_timeout = 30

# --- Task Queue ---
max_concurrent_tasks = 5
max_queued_tasks = 100

# --- Redis (optional) ---
enable_redis = false
redis_host = "localhost"
redis_port = 6379
redis_db = 0
redis_password = ""

# --- Endpoint for generated file URLs ---
# If behind a reverse proxy, set e.g. endpoint = "https://example.com"
endpoint = ""

# --- Cross-posting (Upload-Post) ---
upload_post_enabled = false
upload_post_api_key = ""
upload_post_username = ""
upload_post_platforms = ["tiktok", "instagram"]
upload_post_auto_upload = false


[whisper]
# Only effective when subtitle_provider or transcriber_provider is "whisper"
model_size = "large-v3"
device = "cpu"
compute_type = "int8"


[proxy]
# Proxy for external API calls
# http = "http://user:pass@proxy:1234"
# https = "http://user:pass@proxy:1234"


[ui]
# Whether to hide logs in the WebUI
hide_log = false
# Subtitle position: "top", "center", "bottom", "custom"
subtitle_position = "bottom"
custom_position = 70.0
# Default UI language (e.g. "zh", "en"). Leave empty for auto-detect.
language = ""
