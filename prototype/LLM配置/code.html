<!-- Micro-interaction JS -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('llm-config-form');
            const visibilityBtn = document.querySelector('button[type="button"]');
            const passwordInput = document.querySelector('input[type="password"]');

            // Simple Password Toggle
            visibilityBtn.addEventListener('click', () => {
                const icon = visibilityBtn.querySelector('.material-symbols-outlined');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.innerText = 'visibility_off';
                } else {
                    passwordInput.type = 'password';
                    icon.innerText = 'visibility';
                }
            });

            // Form Submit Effect
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const submitBtn = form.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerText;
                
                submitBtn.disabled = true;
                submitBtn.innerHTML = `
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    正在提交...
                `;

                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalText;
                    alert('配置已成功保存');
                }, 1000);
            });
        });
    </script>
